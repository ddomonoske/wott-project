name: Build

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - development
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: WOTT-macOS
          - os: windows-latest
            artifact_name: WOTT-Windows
          - os: ubuntu-latest
            artifact_name: WOTT-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Build with PyInstaller
        run: pyinstaller wott.spec

      - name: Import certificate
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          security list-keychains -d user -s build.keychain login.keychain

      - name: Debug identities
        if: matrix.os == 'macos-latest'
        run: |
          echo "=== All identities ==="
          security find-identity build.keychain
          echo "=== Valid codesigning identities ==="
          security find-identity -v -p codesigning
          echo "=== Keychain list ==="
          security list-keychains

      - name: Sign the app
        if: matrix.os == 'macos-latest'
        run: |
          CERT_IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk '{print $2}')
          if [ -z "$CERT_IDENTITY" ]; then
            echo "ERROR: No Developer ID Application certificate found. Check that the MACOS_CERTIFICATE secret contains a Developer ID Application cert, not an Apple Development cert."
            exit 1
          fi
          echo "Signing with identity: $CERT_IDENTITY"
          # Sign all Mach-O binaries (catches all executables regardless of name/extension)
          find dist/WOTT.app -type f | while read f; do
            if file "$f" | grep -qE "Mach-O"; then
              codesign --force --options runtime --timestamp --sign "$CERT_IDENTITY" "$f"
            fi
          done
          # Sign framework bundles deepest-first so outer bundles don't invalidate inner ones
          find dist/WOTT.app -name "*.framework" -type d | awk '{print length, $0}' | sort -rn | cut -d' ' -f2- | while read fw; do
            codesign --force --options runtime --timestamp --sign "$CERT_IDENTITY" "$fw"
          done
          codesign --force --options runtime --timestamp --sign "$CERT_IDENTITY" dist/WOTT.app

      - name: Notarize the app
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd dist
          zip -r WOTT-macOS.zip WOTT.app
          SUBMISSION_ID=$(xcrun notarytool submit WOTT-macOS.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json | tee /dev/stderr | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          STATUS=$(xcrun notarytool info "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi
          xcrun stapler staple WOTT.app
          rm WOTT-macOS.zip
          zip -r WOTT-macOS.zip WOTT.app

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/WOTT-macOS.zip

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/WOTT.exe

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/WOTT

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WOTT-macOS/WOTT-macOS.zip
            WOTT-Windows/WOTT.exe
            WOTT-Linux/WOTT
